name: Run tests

on:
  push:
  schedule:
    - cron: '0 0 * * *'

jobs:
  php-tests:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        php: [8.1, 8.2, 8.3, 8.4, 8.5 ]
        laravel: [ 9.*, 10.*, 11.*, 12.* ]
        dependency-version: [ prefer-stable ]
        os: [ ubuntu-latest ]
        include:
          - laravel: 12.*
            testbench: v10.0.0
            database: 10.0.x-dev
          - laravel: 11.*
            testbench: v9.0.0
            database: 9.0.x-dev
          - laravel: 10.*
            testbench: 8.*
            database: 8.0.x-dev
          - laravel: 9.*
            testbench: 7.*
            database: 7.0.x-dev
        exclude:
          - laravel: 11.*
            php: 8.1
          - laravel: 11.*
            php: 8.5
          - laravel: 12.*
            php: 8.1
          - laravel: 10.*
            php: 8.4
          - laravel: 10.*
            php: 8.5
          - laravel: 9.*
            php: 8.1

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.dependency-version }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v1

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick
          coverage: xdebug

      - name: Install dependencies
        env:
          COMPOSER_AUDIT_BLOCK_INSECURE: ${{ matrix.laravel == '8.*' && 'false' || 'true' }}
        run: |
          composer install

      - name: Execute tests
        run: make test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./tests/build/logs/clover.xml